services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ncaa_bracket
      POSTGRES_USER: ncaa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ncaa_dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncaa -d ncaa_bracket"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=ncaa_bracket;Username=ncaa;Password=${POSTGRES_PASSWORD:-ncaa_dev_password}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Jwt__Secret=${JWT_SECRET:-super-secret-jwt-key-change-in-production-min-32-chars!!}
      - Jwt__Issuer=ncaa-bracket-api
      - Jwt__Audience=ncaa-bracket-app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
