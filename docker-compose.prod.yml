services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ncaa_bracket
      POSTGRES_USER: ncaa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncaa -d ncaa_bracket"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/codepoet77/ncaa-backend:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=ncaa_bracket;Username=ncaa;Password=${POSTGRES_PASSWORD}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=ncaa-bracket-api
      - Jwt__Audience=ncaa-bracket-app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/codepoet77/ncaa-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
