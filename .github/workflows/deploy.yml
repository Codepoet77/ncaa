name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Build backend
        run: dotnet build src/backend/NcaaBracket.Api/NcaaBracket.Api.csproj --configuration Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/frontend

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "."
          target: "/opt/ncaa"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/ncaa

            cat > .env <<EOF
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            docker compose up --build -d

            sleep 10

            # Try to obtain SSL cert if not already present
            if docker compose exec frontend test ! -f /etc/letsencrypt/live/bracketology.ca/fullchain.pem 2>/dev/null; then
              echo "Attempting to obtain SSL certificate..."
              if docker compose run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d bracketology.ca -d www.bracketology.ca \
                --email andrewmccatty@gmail.com \
                --agree-tos --no-eff-email 2>&1; then
                echo "SSL cert obtained, enabling HTTPS..."
                docker cp /opt/ncaa/src/frontend/nginx-ssl.conf ncaa-frontend-1:/etc/nginx/conf.d/default.conf
                docker exec ncaa-frontend-1 nginx -s reload
              else
                echo "SSL cert failed (DNS may not be ready yet). Running HTTP only."
              fi
            else
              echo "SSL cert exists, ensuring HTTPS config is active..."
              docker cp /opt/ncaa/src/frontend/nginx-ssl.conf ncaa-frontend-1:/etc/nginx/conf.d/default.conf
              docker exec ncaa-frontend-1 nginx -s reload
            fi

            docker compose ps
