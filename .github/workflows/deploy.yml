name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "."
          target: "/opt/ncaa"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/ncaa

            # Create .env from GitHub secrets
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVEOF

            # Check if SSL cert exists yet
            if [ ! -f /etc/letsencrypt/live/bracketology.ca/fullchain.pem ]; then
              echo "No SSL cert found — running initial setup..."

              # Start with a temporary self-signed cert so nginx can start
              mkdir -p /etc/letsencrypt/live/bracketology.ca
              openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                -keyout /etc/letsencrypt/live/bracketology.ca/privkey.pem \
                -out /etc/letsencrypt/live/bracketology.ca/fullchain.pem \
                -subj "/CN=bracketology.ca" 2>/dev/null

              # Copy temp certs into the volume
              docker compose up -d frontend
              docker compose cp /etc/letsencrypt/live/bracketology.ca/fullchain.pem frontend:/etc/letsencrypt/live/bracketology.ca/fullchain.pem
              docker compose cp /etc/letsencrypt/live/bracketology.ca/privkey.pem frontend:/etc/letsencrypt/live/bracketology.ca/privkey.pem

              # Build and start all services
              docker compose up --build -d

              # Get real cert from Let's Encrypt
              docker compose run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d bracketology.ca -d www.bracketology.ca \
                --email andrewmccatty@gmail.com \
                --agree-tos --no-eff-email

              # Reload nginx with real cert
              docker compose exec frontend nginx -s reload
            else
              # Cert exists — just rebuild and restart
              docker compose down
              docker compose up --build -d
            fi

            sleep 10
            docker compose ps
