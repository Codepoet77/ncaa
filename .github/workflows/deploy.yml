name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/codepoet77/ncaa-backend
  FRONTEND_IMAGE: ghcr.io/codepoet77/ncaa-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Build backend (.NET)
        run: dotnet build src/backend/NcaaBracket.Api/NcaaBracket.Api.csproj --configuration Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/frontend

      - name: Build frontend (Vite)
        run: npm run build
        working-directory: src/frontend

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy config files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.yml,src/db/init.sql,src/frontend/nginx-ssl.conf"
          target: "/opt/ncaa"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout: 300s
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/ncaa

            # Create .env (no leading whitespace)
            printf 'POSTGRES_PASSWORD=%s\nGOOGLE_CLIENT_ID=%s\nJWT_SECRET=%s\n' \
              '${{ secrets.POSTGRES_PASSWORD }}' \
              '${{ secrets.GOOGLE_CLIENT_ID }}' \
              '${{ secrets.JWT_SECRET }}' > .env

            # Pull latest images
            docker pull ghcr.io/codepoet77/ncaa-backend:latest
            docker pull ghcr.io/codepoet77/ncaa-frontend:latest

            # Stop any stuck certbot containers
            docker ps -q --filter "name=ncaa-certbot-run" | xargs -r docker stop
            docker ps -aq --filter "name=ncaa-certbot-run" | xargs -r docker rm

            # Start services
            docker compose -f docker-compose.prod.yml up -d

            sleep 10

            # Skip SSL if DNS isn't ready (check with timeout)
            if ! timeout 5 nslookup bracketology.ca > /dev/null 2>&1; then
              echo "DNS not ready for bracketology.ca — skipping SSL, running HTTP only."
              docker compose -f docker-compose.prod.yml ps
              exit 0
            fi

            # Try SSL cert with timeout
            if docker exec ncaa-frontend-1 test ! -f /etc/letsencrypt/live/bracketology.ca/fullchain.pem 2>/dev/null; then
              echo "Obtaining SSL certificate..."
              timeout 60 docker compose -f docker-compose.prod.yml run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d bracketology.ca -d www.bracketology.ca \
                --email andrewmccatty@gmail.com \
                --agree-tos --no-eff-email && \
              docker cp /opt/ncaa/src/frontend/nginx-ssl.conf ncaa-frontend-1:/etc/nginx/conf.d/default.conf && \
              docker exec ncaa-frontend-1 nginx -s reload && \
              echo "SSL enabled" || echo "SSL failed — running HTTP only."
            else
              docker cp /opt/ncaa/src/frontend/nginx-ssl.conf ncaa-frontend-1:/etc/nginx/conf.d/default.conf
              docker exec ncaa-frontend-1 nginx -s reload
              echo "SSL active"
            fi

            docker compose -f docker-compose.prod.yml ps
