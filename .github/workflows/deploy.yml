name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Build backend
        run: dotnet build src/backend/NcaaBracket.Api/NcaaBracket.Api.csproj --configuration Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/frontend

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "."
          target: "/opt/ncaa"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/ncaa

            # Create .env from GitHub secrets
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVEOF

            # Build and start services (HTTP only first)
            docker compose down
            docker compose up --build -d

            # Wait for frontend to be ready
            sleep 10

            # If SSL cert doesn't exist yet, obtain one
            if [ ! -d "/var/lib/docker/volumes/ncaa_certbot_certs/_data/live/bracketology.ca" ]; then
              echo "Obtaining SSL certificate..."
              docker compose run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d bracketology.ca -d www.bracketology.ca \
                --email andrewmccatty@gmail.com \
                --agree-tos --no-eff-email

              # Switch to SSL nginx config
              docker compose cp src/frontend/nginx-ssl.conf frontend:/etc/nginx/conf.d/default.conf
              docker compose exec frontend nginx -s reload
              echo "SSL enabled"
            else
              echo "SSL cert exists, checking if SSL config is active..."
              docker compose cp src/frontend/nginx-ssl.conf frontend:/etc/nginx/conf.d/default.conf
              docker compose exec frontend nginx -s reload
            fi

            docker compose ps
