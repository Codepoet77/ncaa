name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/codepoet77/ncaa-backend
  FRONTEND_IMAGE: ghcr.io/codepoet77/ncaa-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Build backend (.NET)
        run: dotnet build src/backend/NcaaBracket.Api/NcaaBracket.Api.csproj --configuration Release

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/frontend

      - name: Build frontend (Vite)
        run: npm run build
        working-directory: src/frontend

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy config files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.yml,src/db/init.sql,src/frontend/nginx-ssl.conf"
          target: "/opt/ncaa"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/ncaa

            cat > .env <<EOF
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            # Pull latest images from GHCR (public packages)
            docker pull ghcr.io/codepoet77/ncaa-backend:latest
            docker pull ghcr.io/codepoet77/ncaa-frontend:latest

            # Start services using pre-built images
            docker compose -f docker-compose.prod.yml up -d

            sleep 10

            # Try to obtain SSL cert if not already present
            if docker exec ncaa-frontend-1 test ! -f /etc/letsencrypt/live/bracketology.ca/fullchain.pem 2>/dev/null; then
              echo "Attempting to obtain SSL certificate..."
              if docker compose -f docker-compose.prod.yml run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d bracketology.ca -d www.bracketology.ca \
                --email andrewmccatty@gmail.com \
                --agree-tos --no-eff-email 2>&1; then
                docker cp /opt/ncaa/src/frontend/nginx-ssl.conf ncaa-frontend-1:/etc/nginx/conf.d/default.conf
                docker exec ncaa-frontend-1 nginx -s reload
                echo "SSL enabled"
              else
                echo "SSL cert failed (DNS may not be ready yet). Running HTTP only."
              fi
            else
              docker cp /opt/ncaa/src/frontend/nginx-ssl.conf ncaa-frontend-1:/etc/nginx/conf.d/default.conf
              docker exec ncaa-frontend-1 nginx -s reload
              echo "SSL active"
            fi

            docker compose -f docker-compose.prod.yml ps
